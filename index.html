<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KŌEN — Japanese Fusion</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Shippori+Mincho:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink: #0d0d0d;
      --cream: #f5f0e8;
      --gold: #c9a96e;
      --gold-light: #e8d5a3;
      --muted: #7a7065;
      --bg: #0a0905;
      --surface: #111008;
      --border: rgba(201,169,110,0.2);
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    html { scroll-behavior: smooth; }
 
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }
 
    /* ── CURSOR ── */
    body { cursor: none; }
    #cursor {
      width: 10px; height: 10px;
      background: var(--gold);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.3s ease, height 0.3s ease, background 0.3s ease;
    }
    #cursor.hover { width: 36px; height: 36px; background: transparent; border: 1px solid var(--gold); }
 
    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 60px;
      transition: background 0.4s ease, padding 0.4s ease;
    }
    nav.scrolled {
      background: rgba(10,9,5,0.92);
      backdrop-filter: blur(12px);
      padding: 18px 60px;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.3s ease, color 0.3s ease;
    }
    .nav-links a:hover { opacity: 1; color: var(--gold); }
    .nav-reserve {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 22px;
      background: transparent;
      cursor: none;
      transition: background 0.3s ease, color 0.3s ease;
      text-decoration: none;
    }
    .nav-reserve:hover { background: var(--gold); color: var(--bg); }
 
    /* ── PAGES ── */
    .page { display: none; min-height: 100vh; }
    .page.active { display: block; }
